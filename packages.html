<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Divine Touch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
--bg: #000000;
--desc: #ffffff;
--font-main: "Inter", "SF Mono", Menlo, monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
background: var(--bg);
font-family: var(--font-main);
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
animation: fadeIn 1.2s ease forwards;
text-align:center;
color:white;
padding:4rem 1.5rem;
}

@keyframes fadeIn {
from { opacity:0; transform:translateY(14px); }
to { opacity:1; transform:translateY(0); }
}

/* back link */

.back-link {
position:fixed;
top:1.5rem;
left:1.5rem;
font-size:0.8rem;
letter-spacing:0.14em;
text-decoration:none;
color:white;
opacity:0.6;
}

.back-link:hover {
opacity:1;
}

/* header */

.gateway {
font-size:0.95rem;
letter-spacing:0.18em;
opacity:0.55;
margin-bottom:6vh;
}

/* package container */

.package {
text-decoration:none;
color:white;
display:block;
margin-bottom:2vh;
}

/* titles */

.title {
font-size:1.85rem;
font-weight:700;
transition:0.25s ease;
margin-top:3vh;
}

.package:hover .title {
opacity:0.7;
transform:scale(1.04);
}

/* subtitle */

.description {
font-size:0.95rem;
margin-top:0.4rem;
margin-bottom:1.6rem;
opacity:0.85;
letter-spacing:0.06em;
}

/* images */

.package-image {
max-width:260px;
width:100%;
margin-bottom:4vh;
display:block;
border-radius:6px;
margin-left:auto;
margin-right:auto;
}

/* footer */

.footer {
margin-top:5rem;
font-size:0.75rem;
opacity:0.6;
letter-spacing:0.18em;
}
</style>
</head>

<body>

<a href="index.html" class="back-link">← Gateway</a>

<div class="gateway">— Available Collector Packages —</div>

<a href="1inus.html" class="package">
<div class="title">The One in Us . . .</div>
<div class="description">1/15 Exclusive NFT Collection</div>
<img src="divine.jpg" class="package-image">
</a>

<a href="pussymancer.html" class="package">
<div class="title">Pussymancer</div>
<div class="description">1/1 Exclusive NFT</div>
<img src="pussymancer.jpg" class="package-image">
</a>

<a href="mirage.html" class="package">
<div class="title">Mirage</div>
<div class="description">1/3 Luxury Musical Artifact</div>
<img src="mirage.jpg" class="package-image">
</a>

<div class="footer">
DIVINE TOUCH • CONTACT: DIVINETOUCH.HQ@GMAIL.COM
</div>

</body>
</html>
